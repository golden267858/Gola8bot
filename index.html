<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP PREMIUM ACCESS - GOLA8</title>
    <style>
        /* =========================================
           1. 全局重置与极黑基底
           ========================================= */
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }
        
        /* =========================================
           2. 移动端主视图容器
           ========================================= */
        .main-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto;
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center;
            z-index: 20; 
            background: #050508;
            box-sizing: border-box;
            padding-bottom: 12px; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
        }

        /* =========================================
           3. 顶部高画质 Banner 区域
           ========================================= */
        .hero-banner {
            width: 100%; 
            flex-shrink: 0; 
            position: relative;
        }
        
        .hero-banner img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            /* 画面微呼吸特效，增加活物感 */
            animation: subtleBreathe 4s ease-in-out infinite;
        }

        /* =========================================
           4. 核心转化按钮：TG 私域强引流框
           ========================================= */
        .tg-clickable-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            width: 88%; 
            max-width: 380px; 
            margin: 20px auto;
            padding: 18px 12px; 
            background: linear-gradient(135deg, rgba(36, 161, 222, 0.15) 0%, rgba(0, 136, 204, 0.05) 100%);
            border: 2px solid #24A1DE;
            border-radius: 18px;
            /* TG框专属极光呼吸发光特效 */
            animation: tgBoxGlow 2s infinite alternate;
            transition: transform 0.15s ease;
            box-sizing: border-box;
        }
        
        .tg-clickable-box:active {
            transform: scale(0.95);
        }
        
        .tg-logo-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           5. 营销文案排版
           ========================================= */
        .alert-text { 
            color: #ff3b3b;
            font-weight: 900;
            font-size: 22px; 
            margin: 0 0 8px 0;
            padding: 0;
            text-shadow: 0 0 12px rgba(255, 59, 59, 0.6);
            white-space: nowrap; 
            width: 100%;
            text-align: center;
            letter-spacing: 0.5px;
        }
        
        @media screen and (max-width: 340px) {
            .alert-text { font-size: 18px; }
        }

        .promo-desc { 
            color: #e2e8f0; 
            font-size: 14px; 
            line-height: 1.6; 
            margin: 0; 
        }
        
        .highlight-blue {
            color: #24A1DE;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(36, 161, 222, 0.3);
        }

        /* =========================================
           6. 底部流水提现跑马灯组件
           ========================================= */
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            padding-top: 10px;
        }

        .ticker-wrapper {
            width: 90%;
            max-width: 380px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .ticker-title {
            font-size: 12px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            width: 100%;
        }
        
        .ticker-window {
            position: relative;
            width: 100%;
            height: 42px; 
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 4px solid #ffd700;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.5);
        }
        
        .ticker-item {
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%; 
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            box-sizing: border-box;
            will-change: transform;
        }
        
        .ticker-item .phone { color: #f8f9fa; font-weight: bold; }
        .ticker-item .amount { color: #00e676; font-weight: 900; } 
        .ticker-item .status { 
            font-size: 11px; 
            color: #ffd700; 
            background: rgba(255, 215, 0, 0.15); 
            padding: 3px 8px; 
            border-radius: 4px; 
        }

        /* 动画控制 */
        .slide-in-up { animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-out-up { animation: slideOutUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .copyright {
            font-size: 11px;
            color: #555;
            letter-spacing: 0.5px;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        /* =========================================
           7. 关键帧特效引擎
           ========================================= */
        @keyframes tgBoxGlow {
            0% { box-shadow: 0 0 10px rgba(36, 161, 222, 0.3), inset 0 0 5px rgba(36, 161, 222, 0.1); }
            100% { box-shadow: 0 0 25px rgba(36, 161, 222, 0.7), inset 0 0 15px rgba(36, 161, 222, 0.3); border-color: #4ab8f5; }
        }
        
        @keyframes subtleBreathe {
            0% { filter: brightness(0.95); }
            50% { filter: brightness(1.05); }
            100% { filter: brightness(0.95); }
        }
        
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideOutUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100%); opacity: 0; }
        }

        /* =========================================
           8. Bot-Trap 买量追踪诱捕网
           ========================================= */
        #bot-trap {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: transparent;
            z-index: 10;
            cursor: default;
            display: block;
        }
    </style>
</head>
<body>

    <a href="https://6tjzk.bemobtrcks.com/go/0a423f07-d262-4eeb-ab1c-526e836a5cfd?price={{price}}&ctoken={{ctoken}}&zoneid={{zoneid}}&adid={{adid}}&campaignid={{campaignid}}&category={{category}}&geo={{geo}}&cpmbid={{cpmbid}}&lang={{lang}}" id="bot-trap"></a>

    <div class="main-wrapper">
        <div class="hero-banner">
            <img src="images/gola8-1.webp" onerror="this.src='https://placehold.co/600x400/1c1c26/ffd700?text=GOLA8+VIP+PREMIUM';">
        </div>

        <a id="tg-box" href="#" class="tg-clickable-box">
            <div class="tg-logo-container">
                <svg width="46" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="12" fill="#24A1DE"/>
                    <path d="M16.9 8.2L5.3 12.7C4.5 13 4.5 13.5 5.2 13.7L8.2 14.6L15.1 10.3C15.4 10.1 15.7 10.2 15.5 10.4L9.9 15.4V17.9C9.9 18.4 10.1 18.6 10.5 18.2L11.8 16.9L14.4 18.8C14.9 19.1 15.3 18.9 15.4 18.3L17.1 10.3C17.3 9.3 16.7 8.8 16.9 8.2Z" fill="white"/>
                </svg>
            </div>
            <div class="alert-text">🔥 ကံစမ်းဖို့ အဆင်သင့်ဖြစ်ပြီလား! 🔥</div>
            <div class="promo-desc">
                ငွေသွင်းပါက 100% ပြန်အမ်းငွေရမည်!<br>
                <span class="highlight-blue">လိမ်လည်မှုမရှိ၊ ငွေအစစ်ဖြင့်ကစားပါ။</span>
            </div>
        </a>

        <div class="bottom-section">
            <div class="ticker-wrapper">
                <div class="ticker-title">⚡ VIP တိုက်ရိုက်ငွေထုတ်ယူမှုများ (Live Payouts) ⚡</div>
                <div class="ticker-window" id="ticker-window">
                    </div>
            </div>
            
            <div class="copyright">
                &copy; 2026 VIP PREMIUM ACCESS. All Rights Reserved. | 18+
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 【1. TG 毫秒级唤醒与 ClickID 透传】
            const urlParams = new URLSearchParams(window.location.search);
            const clickid = urlParams.get('clickid') || 'test-MM-user'; 
            const botUsername = 'gola8bot'; 
            // 绑定 tg://resolve 强拉协议
            document.getElementById('tg-box').href = `tg://resolve?domain=${botUsername}&start=${clickid}`;

            // 【2. 单条无缝向上翻滚高仿真引擎】
            const prefixes = ['0945***', '0925***', '0979***', '0997***', '0988***', '0978***', '0969***', '0942***'];
            const statuses = ['အောင်မြင်သည် ✅', 'ထုတ်ယူပြီး 💰'];
            const windowContainer = document.getElementById('ticker-window');

            function injectRecord() {
                if (!windowContainer) return;

                // 随机生成提现金额与尾号
                const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                const randomSuffix = Math.floor(100 + Math.random() * 900); 
                const randomAmount = (Math.floor(Math.random() * 176) * 10000) + 50000; 
                const formattedAmount = randomAmount.toLocaleString();
                const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];

                // 创建新元素，赋予“从下滚入”动画
                const newLi = document.createElement('div');
                newLi.className = 'ticker-item slide-in-up';
                newLi.innerHTML = `
                    <span class="phone">📱 ${randomPrefix}${randomSuffix}</span>
                    <span class="amount">+${formattedAmount} Ks</span>
                    <span class="status">${randomStatus}</span>
                `;

                // 找出当前显示的旧元素，赋予“向上滚出”动画并清理内存
                const currentItems = windowContainer.querySelectorAll('.ticker-item:not(.slide-out-up)');
                currentItems.forEach(item => {
                    item.classList.remove('slide-in-up');
                    item.classList.add('slide-out-up');
                    setTimeout(() => { item.remove(); }, 600); // 配合动画时间彻底销毁
                });

                // 载入新数据
                windowContainer.appendChild(newLi);
            }

            // 初始化加载第一条，随后每 2.8 秒滚动一次
            injectRecord();
            setInterval(injectRecord, 2800);
        });
    </script>
</body>
</html>
