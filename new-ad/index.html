<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD 8 VIP</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        body { 
            margin: 0; 
            background-color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .container { 
            width: 100%; 
            max-width: 460px; 
            padding: 16px; 
            box-sizing: border-box; 
        }
        
        .poster { 
            width: 100%; 
            border-radius: 14px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .poster img { 
            width: 100%; 
            display: block; 
            background-color: #0d1210;
        }
        
        /* 核心 CTA 按钮：官方 TG 蓝 + 高级感缓动呼吸光晕 */
        .btn-link {
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 56px; 
            margin-top: 24px;
            background-color: #24A1DE; 
            color: #ffffff;
            text-decoration: none; 
            border-radius: 12px;
            font-size: 19px; 
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);
            animation: premium-pulse 1.8s infinite ease-in-out;
        }
        
        /* 纯白实心圆圈底座 */
        .tg-circle {
            width: 30px; 
            height: 30px; 
            background-color: #ffffff;
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        /* 官方原版纸飞机 SVG */
        .tg-icon { 
            width: 16px; 
            height: 16px; 
            fill: #24A1DE; 
            margin-left: -1px; /* 修正纸飞机天然视觉重心偏右的问题 */
        }
        
        @keyframes premium-pulse {
            0% { 
                transform: scale(1);
                box-shadow: 0 4px 14px rgba(36, 161, 222, 0.4); 
            }
            50% { 
                transform: scale(1.02);
                box-shadow: 0 6px 28px rgba(36, 161, 222, 0.75); 
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 4px 14px rgba(36, 161, 222, 0.4); 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poster">
            <img src="https://golden267858.us.ci/images/photo_2026-05-20_07-41-21.webp" alt="GOLD 8 Promo">
        </div>
        
        <a id="cta-btn" href="https://golden267858.us.ci/tg" class="btn-link">
            <div class="tg-circle">
                <svg class="tg-icon" viewBox="0 0 24 24">
                    <path d="M21.42 2.62a1 1 0 0 0-.91-.18L2.39 8.76a1 1 0 0 0-.07 1.86l4.63 1.59 2.2 6.6A1 1 0 0 0 10.1 19a1 1 0 0 0 .7-.3l2.84-2.73 4.83 3.56a1 1 0 0 0 1.53-.56l4.15-16a1 1 0 0 0-.73-1.35zM9.36 14.13l-.53-1.6 8.35-5.22-6.19 6.22-.05.15-1.58 1.51v-.06z"/>
                </svg>
            </div>
            <span>ဆက်သွယ်ရန်</span>
        </a>
    </div>

    <script>
        // 修改的核心部分：拿到了你的 urlParams 核心逻辑
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            /* 【注意】这里绝对不能写 window.location.href = ... 
               我们要把拼接好的完整参数，悄悄注入到按钮的 href 属性里。
               这样页面不会自动乱跳，图片能完美展示，用户一点击，带参数的直连流量稳稳送去后台！
            */
            document.getElementById('cta-btn').href = "https://golden267858.us.ci/tg?" + urlParams.toString();
        })();
    </script>
</body>
</html>
