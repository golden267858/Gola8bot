<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD 8 VIP PREMIUM</title>
    <style>
        /* 极致精简，防止滚动，纯净全屏展示海报 */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050508; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 广告海报容器 */
        .poster-container { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .poster-container img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* 覆盖在右下角 TG 图标上的专属呼吸点击层 */
        .tg-pulse-overlay {
            position: absolute;
            right: 11%;
            bottom: 19%;
            width: 16%;
            height: 16%;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            /* 按钮扩散与缩小呼吸特效 */
            animation: tgBreathe 1.5s infinite ease-in-out;
        }

        @keyframes tgBreathe {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(36, 161, 222, 0.6), inset 0 0 0 0 rgba(36, 161, 222, 0.4);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 20px 8px rgba(36, 161, 222, 0.4), inset 0 0 10px 4px rgba(255, 255, 255, 0.2);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(36, 161, 222, 0.6), inset 0 0 0 0 rgba(36, 161, 222, 0.4);
            }
        }

        /* 全图兜底点击层（防止用户没点准图标，只要碰了图就能跳转） */
        .full-page-click {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <img src="/images/photo_2026-05-20_07-41-21.webp" alt="GOLD 8">
        
        <a href="https://6tjzk.bemobtrcks.com/go/3aca8e8f-0634-4289-9559-5d5508acb1b9?price={{price}}&ctoken={{ctoken}}&zoneid={{zoneid}}&adid={{adid}}&campaignid={{campaignid}}&category={{category}}&geo={{geo}}&cpmbid={{cpmbid}}&lang={{lang}}" class="tg-pulse-overlay" id="tg-glow-zone"></a>

        <a href="https://6tjzk.bemobtrcks.com/go/3aca8e8f-0634-4289-9559-5d5508acb1b9?price={{price}}&ctoken={{ctoken}}&zoneid={{zoneid}}&adid={{adid}}&campaignid={{campaignid}}&category={{category}}&geo={{geo}}&cpmbid={{cpmbid}}&lang={{lang}}" class="full-page-click" id="bg-click-zone"></a>
    </div>

    <script>
        // 自动提取可能由广告平台额外透传给落地页的 clickid 参数
        const urlParams = new URLSearchParams(window.location.search);
        const clickid = urlParams.get('clickid');
        if (clickid) {
            const appendClickId = (url) => url + `&clickid=${clickid}`;
            document.getElementById('tg-glow-zone').href = appendClickId(document.getElementById('tg-glow-zone').href);
            document.getElementById('bg-click-zone').href = appendClickId(document.getElementById('bg-click-zone').href);
        }
    </script>
</body>
</html>
