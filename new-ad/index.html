<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .wrapper { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        
        img { width: 100%; display: block; border-radius: 8px; }
        
        /* 下方等宽按钮设计 */
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 60px;
            margin-top: 15px;
            background: linear-gradient(90deg, #24A1DE, #1976D2);
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 4px 25px rgba(36, 161, 222, 0.7); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4); }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="/images/photo_2026-05-20_07-41-21.webp" alt="GOLD 8">
        
        <a href="#" id="tg-btn" class="tg-button">
            <span>ဆက်သွယ်ရန် (Click to Join)</span>
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clickid = params.get('clickid') || params.get('clickId');
        const target = clickid ? `https://t.me/gola8bot?start=${clickid}` : "https://t.me/gola8bot";
        document.getElementById('tg-btn').href = target;
    </script>
</body>
</html>
