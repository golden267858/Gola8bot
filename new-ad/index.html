<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD 8 VIP PREMIUM</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050508; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 精准锁定比例的图片容器，确保内部绝对定位永远不脱节 */
        .poster-container { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto;
        }
        
        .poster-container img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* 完美贴合原图右下角 Telegram 圆角方块的闪光层 */
        .tg-pulse-overlay {
            position: absolute;
            right: 17%;        /* 离图片右侧的精准比例 */
            bottom: 39%;       /* 离图片底部的精准比例 */
            width: 16%;        /* 对应原图白框的宽度 */
            height: 14%;       /* 对应原图白框的高度 */
            border-radius: 15px; /* 吻合原图方块的圆角 */
            cursor: pointer;
            z-index: 10;
            
            /* 提示：上线前若想检查对齐情况，可将 transparent 改为 rgba(255, 0, 0, 0.4) 来看红框范围 */
            background: transparent; 
            
            /* 专属流光发光呼吸动画 */
            animation: tgBoxBreathe 1.8s infinite ease-in-out;
        }

        @keyframes tgBoxBreathe {
            0% {
                box-shadow: 0 0 8px 2px rgba(36, 161, 222, 0.6);
            }
            50% {
                box-shadow: 0 0 25px 12px rgba(36, 161, 222, 0.9);
            }
            100% {
                box-shadow: 0 0 8px 2px rgba(36, 161, 222, 0.6);
            }
        }

        /* 全图盲点跳转层（不管点到图的哪里，没点准按钮也能跳转） */
        .full-page-click {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <img src="/images/photo_2026-05-20_07-41-21.webp" alt="GOLD 8">
        
        <a href="https://6tjzk.bemobtrcks.com/go/3aca8e8f-0634-4289-9559-5d5508acb1b9?price={{price}}&ctoken={{ctoken}}&zoneid={{zoneid}}&adid={{adid}}&campaignid={{campaignid}}&category={{category}}&geo={{geo}}&cpmbid={{cpmbid}}&lang={{lang}}" class="tg-pulse-overlay" id="tg-glow-zone"></a>

        <a href="https://6tjzk.bemobtrcks.com/go/3aca8e8f-0634-4289-9559-5d5508acb1b9?price={{price}}&ctoken={{ctoken}}&zoneid={{zoneid}}&adid={{adid}}&campaignid={{campaignid}}&category={{category}}&geo={{geo}}&cpmbid={{cpmbid}}&lang={{lang}}" class="full-page-click" id="bg-click-zone"></a>
    </div>

    <script>
        // 自动提取可能由 HilltopAds 等买量渠道额外透传的 clickid
        const urlParams = new URLSearchParams(window.location.search);
        const clickid = urlParams.get('clickid');
        if (clickid) {
            const appendClickId = (url) => url + `&clickid=${clickid}`;
            document.getElementById('tg-glow-zone').href = appendClickId(document.getElementById('tg-glow-zone').href);
            document.getElementById('bg-click-zone').href = appendClickId(document.getElementById('bg-click-zone').href);
        }
    </script>
</body>
</html>
