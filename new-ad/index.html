<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            aspect-ratio: 1 / 1; 
        }
        .container img { width: 100%; height: 100%; object-fit: contain; }
        
        /* 这是对齐后的热区，百分比计算方式：
           Left: 71.8% | Top: 67.5% | Width: 15.6% | Height: 13.2%
           这些数值是基于图片正方形区域的绝对比例
        */
        .tg-hotspot { 
            position: absolute; 
            left: 71.8%; 
            top: 67.5%; 
            width: 15.6%; 
            height: 13.2%; 
            border-radius: 15px;
            cursor: pointer;
            z-index: 10;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px #24A1DE; }
            50% { box-shadow: 0 0 20px #24A1DE; }
            100% { box-shadow: 0 0 5px #24A1DE; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/images/photo_2026-05-20_07-41-21.webp">
        <a href="#" id="tg-btn" class="tg-hotspot"></a>
    </div>

    <script>
        // 获取 URL 中的 clickid 并绑定
        const params = new URLSearchParams(window.location.search);
        const clickid = params.get('clickid') || params.get('clickId');
        const link = clickid ? `https://t.me/gola8bot?start=${clickid}` : "https://t.me/gola8bot";
        document.getElementById('tg-btn').href = link;
    </script>
</body>
</html>
